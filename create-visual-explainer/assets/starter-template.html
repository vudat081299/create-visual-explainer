<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="color-scheme" content="dark light">
  <title>Visual Explainer — Starter</title>

  <!-- Fonts: single Google Fonts request -->
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;700&family=JetBrains+Mono:wght@400;500&display=swap">

  <style>
    /* ==========================================================
       INDUSTRIAL DATA — TOKENS
       Dark mode is default. Light mode via [data-theme="light"].
       ========================================================== */
    :root {
      /* Surfaces */
      --bg:       #0a0a0f;
      --surface:  #111118;
      --card:     #16161f;
      --border:   #2a2a3a;
      --hairline: rgba(255,255,255,0.04);

      /* Text */
      --text-primary:   #f0f0f8;
      --text-secondary: #a8a8c0;
      --text-muted:     #8888a8;
      --text-dim:       #5a5a78;

      /* Accents (hex + rgb channels for triple-opacity rule) */
      --accent-green:      #00e5a0; --accent-green-rgb:  0 229 160;
      --accent-blue:       #3b82f6; --accent-blue-rgb:   59 130 246;
      --accent-yellow:     #f5d000; --accent-yellow-rgb: 245 208 0;
      --accent-red:        #ff4560; --accent-red-rgb:    255 69 96;
      --accent-purple:     #c084fc; --accent-purple-rgb: 192 132 252;
      --accent-cyan:       #22d3ee; --accent-cyan-rgb:   34 211 238;

      /* Fonts */
      --font-display: 'Bebas Neue', 'Oswald', 'Arial Narrow', sans-serif;
      --font-body:    'DM Sans', system-ui, sans-serif;
      --font-mono:    'JetBrains Mono', 'Fira Code', 'SF Mono', monospace;

      /* Type scale */
      --fs-hero: clamp(40px, 8vw, 100px);
      --fs-h1:   clamp(32px, 5vw, 56px);
      --fs-h2:   clamp(24px, 3.5vw, 36px);
      --fs-h3:   20px;
      --fs-lg:   18px;
      --fs-base: 14px;
      --fs-sm:   13px;
      --fs-xs:   12px;
      --fs-label:11px;
      --fs-micro:10px;
      --fs-nano:  9px;

      /* Spacing */
      --sp-1: 4px; --sp-2: 8px; --sp-3: 12px; --sp-4: 16px; --sp-5: 20px;
      --sp-6: 24px; --sp-8: 32px; --sp-10: 40px; --sp-12: 48px;
      --sp-16: 64px; --sp-20: 80px;

      /* Radius */
      --r-xs: 3px; --r-sm: 6px; --r-md: 10px; --r-lg: 12px; --r-xl: 16px; --r-pill: 9999px;

      /* Z-index */
      --z-sticky: 10; --z-overlay: 1000; --z-modal: 1100;

      /* Motion */
      --dur-fast:  150ms;
      --dur-base:  250ms;
      --dur-entry: 650ms;
      --ease-out:  cubic-bezier(0.16, 1, 0.3, 1);
    }

    [data-theme="light"] {
      --bg:       #fafafa;
      --surface:  #f0f0f4;
      --card:     #ffffff;
      --border:   #d4d4dc;
      --hairline: rgba(0,0,0,0.05);

      --text-primary:   #0a0a0f;
      --text-secondary: #3a3a4a;
      --text-muted:     #6a6a7e;
      --text-dim:       #9a9aae;

      --accent-green:      #008060; --accent-green-rgb:  0 128 96;
      --accent-blue:       #1d4ed8; --accent-blue-rgb:   29 78 216;
      --accent-yellow:     #936a00; --accent-yellow-rgb: 147 106 0;
      --accent-red:        #c41e3a; --accent-red-rgb:    196 30 58;
      --accent-purple:     #7c3aed; --accent-purple-rgb: 124 58 237;
      --accent-cyan:       #0e7490; --accent-cyan-rgb:   14 116 144;
    }

    /* ==========================================================
       BASE
       ========================================================== */
    *, *::before, *::after { box-sizing: border-box; }
    html { -webkit-text-size-adjust: 100%; }
    body {
      margin: 0;
      background: var(--bg);
      color: var(--text-primary);
      font-family: var(--font-body);
      font-size: var(--fs-base);
      line-height: 1.5;
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
      transition: background var(--dur-base) var(--ease-out),
                  color      var(--dur-base) var(--ease-out);
    }

    /* Body grid texture (signature element) */
    body::before {
      content: '';
      position: fixed; inset: 0;
      background-image:
        repeating-linear-gradient(0deg,  transparent 0 39px, var(--hairline) 39px 40px),
        repeating-linear-gradient(90deg, transparent 0 39px, var(--hairline) 39px 40px);
      z-index: 0;
      pointer-events: none;
    }
    body > * { position: relative; z-index: 1; }

    /* Tabular numerals for any numeric content */
    .numeric, table td, .stat-value, code, pre, input[type="number"] {
      font-variant-numeric: tabular-nums lining-nums;
    }

    a { color: var(--accent-cyan); text-decoration: none; }
    a:hover { text-decoration: underline; }

    /* Focus indicator */
    :focus-visible {
      outline: 2px solid var(--accent-green);
      outline-offset: 2px;
      border-radius: var(--r-xs);
    }

    /* ==========================================================
       LAYOUT
       ========================================================== */
    .container {
      width: 100%;
      max-width: 1200px;
      margin-inline: auto;
      padding-inline: clamp(var(--sp-4), 4vw, var(--sp-12));
    }
    .stack-12 > * + * { margin-top: var(--sp-12); }
    .stack-8  > * + * { margin-top: var(--sp-8);  }
    .stack-5  > * + * { margin-top: var(--sp-5);  }

    /* ==========================================================
       PAGE HEADER (eyebrow → title → subtitle)
       ========================================================== */
    .page-head { display: flex; flex-direction: column; gap: var(--sp-3); padding: var(--sp-16) 0 var(--sp-8); }
    .eyebrow {
      font-family: var(--font-mono);
      font-size: var(--fs-label);
      letter-spacing: 0.2em;
      color: var(--accent-green);
      text-transform: uppercase;
    }
    .title {
      font-family: var(--font-display);
      font-size: var(--fs-hero);
      line-height: 0.9;
      color: var(--text-primary);
      letter-spacing: 0.01em;
      margin: 0;
    }
    .title span { color: var(--accent-green); }
    .subtitle {
      font-family: var(--font-body);
      font-weight: 300;
      font-size: var(--fs-base);
      color: var(--text-secondary);
      max-width: 520px;
      line-height: 1.5;
      margin: 0;
    }
    .meta {
      font-family: var(--font-mono);
      font-size: var(--fs-label);
      color: var(--text-dim);
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }
    .meta b { color: var(--accent-yellow); font-weight: normal; }

    /* ==========================================================
       NAVBAR (minimal, with theme toggle)
       ========================================================== */
    .navbar {
      position: sticky; top: 0;
      background: var(--bg);
      border-bottom: 1px solid var(--border);
      z-index: var(--z-sticky);
    }
    .navbar-inner {
      display: flex; align-items: center; justify-content: space-between;
      gap: var(--sp-6);
      max-width: 1400px;
      margin-inline: auto;
      padding: var(--sp-3) clamp(var(--sp-4), 4vw, var(--sp-6));
      min-height: 56px;
    }
    .navbar-brand { display: flex; align-items: center; gap: var(--sp-2); color: var(--text-primary); }
    .brand-mark {
      display: grid; place-items: center;
      width: 28px; height: 28px;
      background: var(--accent-green); color: var(--bg);
      border-radius: var(--r-sm);
      font-size: 18px; font-weight: 700;
    }
    .brand-name {
      font-family: var(--font-display);
      font-size: 20px; letter-spacing: 0.05em;
    }
    .brand-name span { color: var(--accent-green); }

    /* ==========================================================
       BUTTONS
       ========================================================== */
    .btn {
      display: inline-flex; align-items: center; gap: var(--sp-2);
      font-family: var(--font-body); font-weight: 500;
      font-size: var(--fs-sm);
      padding: var(--sp-3) var(--sp-5);
      min-height: 40px;
      border-radius: var(--r-sm);
      border: 1px solid transparent;
      cursor: pointer;
      transition: background var(--dur-fast) var(--ease-out),
                  border-color var(--dur-fast) var(--ease-out);
    }
    .btn-ghost { background: transparent; color: var(--text-primary); }
    .btn-ghost:hover { background: var(--hairline); }
    .btn-secondary {
      background: var(--card); color: var(--text-primary);
      border-color: var(--border);
    }
    .btn-primary { background: var(--accent-green); color: var(--bg); }
    .btn-sm { min-height: 32px; padding: var(--sp-2) var(--sp-4); font-size: var(--fs-xs); }

    /* ==========================================================
       ENTRY ANIMATION (stagger via nth-child)
       ========================================================== */
    @keyframes enter {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .reveal {
      opacity: 0;
      animation: enter var(--dur-entry) var(--ease-out) forwards;
    }
    .reveal:nth-child(1) { animation-delay: 0ms; }
    .reveal:nth-child(2) { animation-delay: 80ms; }
    .reveal:nth-child(3) { animation-delay: 160ms; }
    .reveal:nth-child(4) { animation-delay: 240ms; }
    .reveal:nth-child(5) { animation-delay: 320ms; }
    .reveal:nth-child(6) { animation-delay: 400ms; }
    .reveal:nth-child(n+7) { animation-delay: 480ms; }

    /* Reduced motion */
    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: 0.01ms !important;
        transition-duration: 0.01ms !important;
      }
    }

    /* ==========================================================
       PRINT (force light)
       ========================================================== */
    @media print {
      :root {
        --bg: #fff; --surface: #f5f5f5; --card: #fff; --border: #ccc;
        --text-primary: #000; --text-secondary: #333; --text-muted: #555;
      }
      body::before { display: none; }
      .reveal { opacity: 1 !important; animation: none !important; }
      .navbar { position: static; }
    }
  </style>
</head>
<body>

  <header class="navbar">
    <div class="navbar-inner">
      <a href="/" class="navbar-brand">
        <span class="brand-mark">⌬</span>
        <span class="brand-name">DATA<span>LAB</span></span>
      </a>

      <button class="btn btn-ghost btn-sm" id="theme-toggle" aria-label="Toggle theme">
        <span class="theme-label">DARK</span>
      </button>
    </div>
  </header>

  <main class="container stack-12">

    <header class="page-head">
      <span class="eyebrow reveal">CHAPTER 01 · STARTER</span>
      <h1 class="title reveal">Industrial <span>Data</span></h1>
      <p class="subtitle reveal">A dark-first design starter — Bebas Neue display, DM Sans body, JetBrains Mono labels. Replace this section with your content.</p>
      <p class="meta reveal">UPDATED <b>2026-05-04</b> · VERSION <b>1.0</b></p>
    </header>

    <!-- Add your sections here. Each direct child of .container with .reveal class will stagger-animate in. -->

  </main>

  <script>
    // Theme toggle + persistence
    (function() {
      const root   = document.documentElement;
      const btn    = document.getElementById('theme-toggle');
      const label  = btn.querySelector('.theme-label');

      const saved = localStorage.getItem('theme');
      if (saved === 'light') root.setAttribute('data-theme', 'light');
      label.textContent = root.getAttribute('data-theme').toUpperCase();

      btn.addEventListener('click', () => {
        const next = root.getAttribute('data-theme') === 'light' ? 'dark' : 'light';
        root.setAttribute('data-theme', next);
        localStorage.setItem('theme', next);
        label.textContent = next.toUpperCase();
      });
    })();
  </script>

</body>
</html>
